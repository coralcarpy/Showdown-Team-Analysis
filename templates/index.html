<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéBuilder — Team Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e3350d;
    --dark-red: #a02008;
    --yellow: #ffcb05;
    --blue: #3d7dca;
    --dark-blue: #003a70;
    --white: #f8f8f8;
    --off-white: #eef2f8;
    --dark: #1a1a2e;
    --darker: #0f0f1a;
    --card: #1e2240;
    --card-lighter: #252a4a;
    --text: #e8eaf6;
    --text-muted: #8892b0;
    --green: #4caf50;
    --orange: #ff9800;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);

    /* Type colors */
    --type-Normal: #A8A878; --type-Fire: #F08030; --type-Water: #6890F0;
    --type-Electric: #F8D030; --type-Grass: #78C850; --type-Ice: #98D8D8;
    --type-Fighting: #C03028; --type-Poison: #A040A0; --type-Ground: #E0C068;
    --type-Flying: #A890F0; --type-Psychic: #F85888; --type-Bug: #A8B820;
    --type-Rock: #B8A038; --type-Ghost: #705898; --type-Dragon: #7038F8;
    --type-Dark: #705848; --type-Steel: #B8B8D0; --type-Fairy: #EE99AC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Pokéball background pattern */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -20%;
    width: 80vw;
    height: 80vw;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, transparent 48%, var(--red) 48%, var(--red) 52%, transparent 52%),
                radial-gradient(circle at 50% 50%, transparent 40%, rgba(227,53,13,0.08) 40%);
    pointer-events: none;
    opacity: 0.15;
    z-index: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--dark-red) 0%, var(--red) 50%, var(--dark-blue) 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
    border-bottom: 4px solid var(--yellow);
    box-shadow: var(--shadow);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--yellow), transparent, var(--yellow));
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--dark-red), -1px -1px 0 #000;
    letter-spacing: 2px;
    line-height: 1.4;
  }

  .logo span {
    color: white;
    display: block;
    font-size: 10px;
    margin-top: 6px;
    letter-spacing: 3px;
    text-shadow: 1px 1px 0 var(--dark-blue);
    opacity: 0.9;
  }

  .pokeball-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--red) 50%, white 50%);
    border: 3px solid #333;
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 0 4px 8px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .pokeball-icon::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 100%; height: 3px;
    background: #333;
  }
  .pokeball-icon::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    border: 3px solid #333;
  }

  /* Main Layout */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px;
    position: relative;
    z-index: 1;
  }

  /* Input Section */
  .input-section {
    background: var(--card);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: var(--shadow);
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,203,5,0.4), transparent);
  }

  .input-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .paste-area {
    flex: 1;
    background: var(--darker);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', monospace;
    font-size: 12px;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    min-height: 180px;
    transition: border-color 0.2s;
    outline: none;
  }
  .paste-area:focus { border-color: var(--blue); }
  .paste-area::placeholder { color: var(--text-muted); }

  .input-controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 180px;
  }

  .format-select {
    background: var(--darker);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .format-select:focus { border-color: var(--blue); }

  .analyze-btn {
    background: linear-gradient(135deg, var(--red), var(--dark-red));
    border: none;
    border-radius: 12px;
    color: var(--yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    box-shadow: 0 4px 0 var(--dark-red), 0 6px 12px rgba(0,0,0,0.3);
    line-height: 1.6;
  }
  .analyze-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 var(--dark-red), 0 8px 16px rgba(0,0,0,0.4);
  }
  .analyze-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--dark-red), 0 4px 8px rgba(0,0,0,0.3);
  }
  .analyze-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 60px;
  }
  .loading.active { display: block; }
  .pokeball-spin {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--red) 50%, white 50%);
    border: 4px solid #333;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
    position: relative;
  }
  .pokeball-spin::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 100%; height: 4px;
    background: #333;
  }
  .pokeball-spin::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 18px;
    border-radius: 50%;
    background: white;
    border: 4px solid #333;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--text-muted);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Error */
  .error-box {
    display: none;
    background: rgba(227,53,13,0.15);
    border: 1px solid rgba(227,53,13,0.4);
    border-radius: 12px;
    padding: 16px 20px;
    color: #ff7961;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 700;
  }
  .error-box.active { display: block; }

  /* Results */
  .results { display: none; }
  .results.active { display: block; }

  /* Team row */
  .team-overview {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .poke-card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    flex: 1;
    min-width: 150px;
    max-width: 180px;
    border: 1px solid rgba(255,255,255,0.07);
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow);
  }
  .poke-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .poke-sprite {
    width: 80px; height: 80px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    margin-bottom: 8px;
  }

  .poke-name {
    font-weight: 800;
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--white);
  }

  .type-badges {
    display: flex;
    gap: 4px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .type-badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: white;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  /* Analysis Grid */
  .analysis-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }

  .analysis-card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: var(--shadow);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .card-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--yellow);
    letter-spacing: 1px;
    line-height: 1.6;
  }

  /* Type coverage grid */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }

  .type-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    cursor: default;
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .type-cell:hover { transform: scale(1.15); z-index: 10; }
  .type-cell .type-name { font-size: 7px; margin-top: 2px; opacity: 0.9; }

  .coverage-covered { opacity: 1; }
  .coverage-missing {
    opacity: 0.35;
    filter: grayscale(0.5);
  }
  .coverage-missing::after {
    content: '✗';
    position: absolute;
    font-size: 18px;
    color: rgba(255,0,0,0.7);
    font-weight: 900;
  }

  /* Hazard bars */
  .hazard-list { display: flex; flex-direction: column; gap: 10px; }

  .hazard-item {
    background: var(--card-lighter);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hazard-name { font-weight: 800; font-size: 13px; flex: 1; }
  .hazard-damage-bar {
    width: 120px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hazard-damage-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s ease;
  }
  .hazard-damage-pct {
    font-size: 12px;
    font-weight: 700;
    min-width: 42px;
    text-align: right;
    color: var(--text-muted);
  }
  .boots-badge {
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(61,125,202,0.3);
    border: 1px solid rgba(61,125,202,0.5);
    border-radius: 20px;
    color: #90caf9;
    font-weight: 700;
  }

  /* Threat list */
  .threat-item {
    background: var(--card-lighter);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 4px solid var(--red);
  }
  .threat-item.warning { border-left-color: var(--orange); }

  .threat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .threat-name { font-weight: 800; font-size: 14px; }
  .threat-count {
    background: var(--red);
    color: white;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
  }
  .threat-count.warn { background: var(--orange); }
  .threat-usage {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .threatened-mons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .threatened-mon {
    background: rgba(255,255,255,0.07);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  /* Speed tiers */
  .speed-list { display: flex; flex-direction: column; gap: 8px; }
  .speed-item {
    background: var(--card-lighter);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .speed-rank {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--yellow);
    min-width: 24px;
  }
  .speed-name { font-weight: 800; font-size: 13px; flex: 1; }
  .speed-stat {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--blue);
    min-width: 40px;
    text-align: right;
  }
  .speed-bar {
    width: 80px; height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  .speed-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), #90caf9);
    border-radius: 4px;
  }

  /* Status badges */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .status-item {
    background: var(--card-lighter);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-name { font-weight: 800; font-size: 13px; text-transform: capitalize; }
  .status-covered { color: var(--green); }
  .status-missing { color: #ff7961; }

  /* Win conditions */
  .archetype-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--blue), var(--dark-blue));
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: white;
    letter-spacing: 1px;
    margin-bottom: 16px;
    box-shadow: 0 4px 12px rgba(61,125,202,0.4);
  }
  .wc-list { display: flex; flex-direction: column; gap: 8px; }
  .wc-item {
    background: var(--card-lighter);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .wc-category {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    min-width: 100px;
  }
  .wc-mons { font-size: 13px; font-weight: 700; color: var(--text); }

  /* Removal section */
  .removal-status {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-radius: 12px;
    margin-bottom: 14px;
    font-weight: 800;
    font-size: 14px;
  }
  .removal-ok { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #a5d6a7; }
  .removal-missing { background: rgba(227,53,13,0.15); border: 1px solid rgba(227,53,13,0.3); color: #ff7961; }

  /* Export button */
  .export-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .export-btn {
    background: linear-gradient(135deg, var(--blue), var(--dark-blue));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 0 var(--dark-blue);
  }
  .export-btn:hover { transform: translateY(-2px); }

  /* Tooltip */
  [data-tooltip] { position: relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main { padding: 16px; }
    .input-row { flex-direction: column; }
    .input-controls { flex-direction: row; min-width: unset; }
    .analysis-grid { grid-template-columns: 1fr; }
    .type-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="pokeball-icon"></div>
    <div class="logo">
      PokéBuilder
      <span>Team Analysis Tool</span>
    </div>
  </div>
</header>

<main class="main">

  <!-- Input -->
  <div class="input-section">
    <div class="section-title">Paste Your Team</div>
    <div class="input-row">
      <textarea class="paste-area" id="pokepaste" placeholder="Paste your team from Pokémon Showdown here...

Gholdengo @ Choice Specs
Ability: Good as Gold
Tera Type: Steel
EVs: 4 Def / 252 SpA / 252 Spe
Timid Nature
- Make It Rain
- Shadow Ball
- Trick
- Focus Blast"></textarea>
      <div class="input-controls">
        <select class="format-select" id="format">
          <option value="gen9ou">Gen 9 OU</option>
          <option value="gen9uu">Gen 9 UU</option>
          <option value="gen9nu">Gen 9 NU</option>
        </select>
        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeTeam()">
          ► ANALYZE<br>TEAM
        </button>
      </div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="pokeball-spin"></div>
    <p class="loading-text">Analyzing team...</p>
  </div>

  <!-- Results -->
  <div class="results" id="results">

    <!-- Team Overview -->
    <div class="section-title">Your Team</div>
    <div class="team-overview" id="teamOverview"></div>

    <div class="analysis-grid" id="analysisGrid"></div>

    <div class="export-row">
      <button class="export-btn" onclick="openReport()">📋 View Full Report</button>
    </div>

  </div>

</main>

<script>
const TYPE_COLORS = {
  Normal:'#A8A878',Fire:'#F08030',Water:'#6890F0',Electric:'#F8D030',
  Grass:'#78C850',Ice:'#98D8D8',Fighting:'#C03028',Poison:'#A040A0',
  Ground:'#E0C068',Flying:'#A890F0',Psychic:'#F85888',Bug:'#A8B820',
  Rock:'#B8A038',Ghost:'#705898',Dragon:'#7038F8',Dark:'#705848',
  Steel:'#B8B8D0',Fairy:'#EE99AC'
};

const TYPE_ICONS = {
  Normal:'⚪',Fire:'🔥',Water:'💧',Electric:'⚡',Grass:'🌿',Ice:'❄️',
  Fighting:'🥊',Poison:'☠️',Ground:'🏔️',Flying:'🦅',Psychic:'🔮',Bug:'🐛',
  Rock:'🪨',Ghost:'👻',Dragon:'🐉',Dark:'🌑',Steel:'⚙️',Fairy:'✨'
};

let currentData = null;

async function analyzeTeam() {
  const paste = document.getElementById('pokepaste').value.trim();
  const format = document.getElementById('format').value;

  if (!paste) {
    showError('Please paste a team first!');
    return;
  }

  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  document.getElementById('analyzeBtn').disabled = true;

  try {
    const res = await fetch('/api/analysis/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pokepaste: paste, format})
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Analysis failed');

    currentData = data;
    renderResults(data);
  } catch(e) {
    showError('Error: ' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.classList.add('active');
  document.getElementById('loading').classList.remove('active');
}

function renderResults(data) {
  const { team, analysis } = data;
  renderTeamOverview(team);
  renderAnalysisCards(analysis, team);
  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({behavior: 'smooth'});
}

function renderTeamOverview(team) {
  const container = document.getElementById('teamOverview');
  container.innerHTML = team.map(p => {
    const types = p.types || [];
    const badges = types.map(t =>
      `<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`
    ).join('');
    const spriteUrl = p.sprite_url || p.sprite_static || '';
    const fallback = p.sprite_static || '';
    return `
      <div class="poke-card">
        <img class="poke-sprite" src="${spriteUrl}"
             onerror="this.src='${fallback}'"
             alt="${p.name}">
        <div class="poke-name">${p.name}</div>
        <div class="type-badges">${badges}</div>
        ${p.item ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">@ ${p.item}</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderAnalysisCards(analysis, team) {
  const grid = document.getElementById('analysisGrid');
  grid.innerHTML = '';

  // 1. Defensive Coverage
  grid.appendChild(makeDefensiveCoverageCard(analysis.defensive_coverage, team));

  // 2. Hazard Weakness
  grid.appendChild(makeHazardCard(analysis.hazard_weakness, analysis.hazard_removal));

  // 3. Threat Analysis
  grid.appendChild(makeThreatCard(analysis.threat_analysis));

  // 4. Speed Tiers
  grid.appendChild(makeSpeedCard(analysis.speed_tiers));

  // 5. Status Coverage
  grid.appendChild(makeStatusCard(analysis.status_coverage));

  // 6. Win Conditions
  grid.appendChild(makeWinCondCard(analysis.win_conditions));

  // 7. Offensive Coverage
  grid.appendChild(makeOffensiveCoverageCard(analysis.offensive_coverage));
}

function card(icon, iconBg, title, content) {
  return `
    <div class="analysis-card">
      <div class="card-header">
        <div class="card-icon" style="background:${iconBg}">${icon}</div>
        <div class="card-title">${title}</div>
      </div>
      ${content}
    </div>
  `;
}

function makeDefensiveCoverageCard(coverage, team) {
  const el = document.createElement('div');
  const allTypes = Object.keys(TYPE_COLORS);

  const cells = allTypes.map(type => {
    const data = coverage[type] || {};
    const hasResist = data.has_resist || data.has_immunity;
    const cls = hasResist ? 'coverage-covered' : 'coverage-missing';
    const color = TYPE_COLORS[type] || '#888';
    const icon = TYPE_ICONS[type] || '?';
    const minVal = data.min != null ? data.min : '?';
    const tooltip = hasResist
      ? `${type}: Best resist ×${minVal}`
      : `${type}: No resist! (×${minVal} weakest)`;
    return `
      <div class="type-cell ${cls}" style="background:${color}22;border:2px solid ${color}66"
           data-tooltip="${tooltip}">
        <span style="font-size:14px">${icon}</span>
        <span class="type-name" style="color:${color}">${type.substring(0,3)}</span>
      </div>
    `;
  }).join('');

  const missingCount = allTypes.filter(t => {
    const d = coverage[t] || {};
    return !d.has_resist && !d.has_immunity;
  }).length;

  el.innerHTML = card('🛡️', 'rgba(61,125,202,0.3)', 'DEFENSIVE COVERAGE', `
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">
      ${missingCount === 0 ? '✅ Full coverage!' : `⚠ Missing resist for <strong style="color:#ff7961">${missingCount} types</strong>`}
    </p>
    <div class="type-grid">${cells}</div>
  `);
  return el;
}

function makeHazardCard(hazards, removal) {
  const el = document.createElement('div');
  const removalHtml = removal.has_removal
    ? `<div class="removal-status removal-ok">✅ ${removal.removers.map(r => `${r.name} (${r.move})`).join(', ')}</div>`
    : `<div class="removal-status removal-missing">⚠ No hazard removal!</div>`;

  const maxDmg = Math.max(...hazards.map(h => h.sr_damage), 50);
  const items = hazards.map(h => {
    const pct = h.sr_damage_with_boots;
    const barPct = Math.min(100, (pct / 50) * 100);
    const color = pct === 0 ? '#4caf50' : pct <= 12.5 ? '#ffcb05' : pct <= 25 ? '#ff9800' : '#e3350d';
    return `
      <div class="hazard-item">
        <div class="hazard-name">${h.name}</div>
        ${h.has_boots ? '<span class="boots-badge">Boots</span>' : ''}
        <div class="hazard-damage-bar">
          <div class="hazard-damage-fill" style="width:${barPct}%;background:${color}"></div>
        </div>
        <div class="hazard-damage-pct" style="color:${color}">${pct > 0 ? pct.toFixed(1) + '%' : 'Immune'}</div>
      </div>
    `;
  }).join('');

  el.innerHTML = card('⚡', 'rgba(227,53,13,0.3)', 'HAZARD WEAKNESS (SR)', `
    ${removalHtml}
    <div class="hazard-list">${items}</div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:10px">Showing Stealth Rock damage. Boots holders marked.</p>
  `);
  return el;
}

function makeThreatCard(threats) {
  const el = document.createElement('div');
  const list = threats.threats || [];

  if (list.length === 0) {
    el.innerHTML = card('⚔️', 'rgba(255,152,0,0.3)', 'THREAT ANALYSIS', `
      <p style="color:var(--green);font-weight:800">✅ No major shared weaknesses found!</p>
    `);
    return el;
  }

  const items = list.slice(0, 5).map(t => {
    const isCritical = t.threatened_count >= 3;
    const monBadges = t.threatened_pokemon.map(p =>
      `<span class="threatened-mon">${p.name}</span>`
    ).join('');
    const typeBadges = (t.types || []).map(type =>
      `<span class="type-badge" style="background:${TYPE_COLORS[type]||'#888'}">${type}</span>`
    ).join('');
    return `
      <div class="threat-item ${isCritical ? '' : 'warning'}">
        <div class="threat-header">
          <span class="threat-name">${t.threat}</span>
          <span class="threat-count ${isCritical ? '' : 'warn'}">${t.threatened_count} mons</span>
          ${t.usage_rate ? `<span class="threat-usage">${t.usage_rate}% usage</span>` : ''}
        </div>
        <div class="type-badges" style="margin-bottom:8px">${typeBadges}</div>
        <div class="threatened-mons">${monBadges}</div>
      </div>
    `;
  }).join('');

  el.innerHTML = card('⚔️', 'rgba(255,152,0,0.3)', 'THREAT ANALYSIS', items);
  return el;
}

function makeSpeedCard(speedTiers) {
  const el = document.createElement('div');
  const maxSpd = Math.max(...speedTiers.map(s => s.calculated_speed), 1);

  const items = speedTiers.map((s, i) => `
    <div class="speed-item">
      <span class="speed-rank">#${i+1}</span>
      <span class="speed-name">${s.name}</span>
      <div class="speed-bar">
        <div class="speed-bar-fill" style="width:${(s.calculated_speed/maxSpd*100).toFixed(0)}%"></div>
      </div>
      <span class="speed-stat">${s.calculated_speed || '?'}</span>
    </div>
  `).join('');

  el.innerHTML = card('💨', 'rgba(76,175,80,0.3)', 'SPEED TIERS', `
    <div class="speed-list">${items}</div>
  `);
  return el;
}

function makeStatusCard(status) {
  const el = document.createElement('div');
  const coverage = status.coverage || {};
  const statuses = ['burn', 'poison', 'paralysis', 'sleep'];
  const icons = {burn:'🔥', poison:'☠️', paralysis:'⚡', sleep:'💤'};

  const items = statuses.map(s => {
    const covered = coverage[s];
    return `
      <div class="status-item">
        <div class="status-dot" style="background:${covered ? '#4caf50' : '#e3350d'}"></div>
        <span style="font-size:16px">${icons[s]}</span>
        <span class="status-name ${covered ? 'status-covered' : 'status-missing'}">${s}</span>
        <span style="margin-left:auto;font-size:12px;font-weight:700;color:${covered ? '#4caf50' : '#ff7961'}">${covered ? '✓' : '✗'}</span>
      </div>
    `;
  }).join('');

  const resistors = (status.resistors || []).slice(0, 3).map(r =>
    `<span style="font-size:12px;color:var(--text-muted)">${r.name}: ${r.reason}</span>`
  ).join('<br>');

  el.innerHTML = card('🏥', 'rgba(76,175,80,0.3)', 'STATUS COVERAGE', `
    <div class="status-grid">${items}</div>
    ${resistors ? `<div style="margin-top:14px;padding:10px 14px;background:var(--card-lighter);border-radius:8px;line-height:1.8">${resistors}</div>` : ''}
  `);
  return el;
}

function makeWinCondCard(winConds) {
  const el = document.createElement('div');
  const archetype = winConds.team_archetype || 'Unknown';
  const wc = winConds.win_conditions || {};

  const relevantCats = ['setup', 'hazard_setter', 'pivot', 'trick_room', 'wallbreaker_moves'];
  const catNames = {setup:'Setup', hazard_setter:'Hazards', pivot:'Pivots', trick_room:'Trick Room', wallbreaker_moves:'Breakers'};

  const items = relevantCats.filter(cat => (wc[cat] || []).length > 0).map(cat => {
    const entries = wc[cat].map(e => `${e.pokemon} (${e.moves.join(', ')})`).join(' | ');
    return `
      <div class="wc-item">
        <span class="wc-category">${catNames[cat]}</span>
        <span class="wc-mons">${entries}</span>
      </div>
    `;
  }).join('');

  el.innerHTML = card('🏆', 'rgba(255,203,5,0.3)', 'WIN CONDITIONS', `
    <div class="archetype-badge">${archetype}</div>
    <div class="wc-list">${items || '<p style="color:var(--text-muted);font-size:13px">No clear win conditions detected</p>'}</div>
  `);
  return el;
}

function makeOffensiveCoverageCard(offCov) {
  const el = document.createElement('div');
  const covered = new Set(offCov.covered_types || []);
  const allTypes = Object.keys(TYPE_COLORS);

  const cells = allTypes.map(type => {
    const hasCov = covered.has(type);
    const color = TYPE_COLORS[type] || '#888';
    const icon = TYPE_ICONS[type] || '?';
    return `
      <div class="type-cell ${hasCov ? 'coverage-covered' : 'coverage-missing'}"
           style="background:${color}22;border:2px solid ${color}66"
           data-tooltip="${type}: ${hasCov ? 'Can hit SE' : 'No SE coverage'}">
        <span style="font-size:14px">${icon}</span>
        <span class="type-name" style="color:${color}">${type.substring(0,3)}</span>
      </div>
    `;
  }).join('');

  el.innerHTML = card('⚡', 'rgba(240,128,48,0.3)', 'OFFENSIVE COVERAGE', `
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">
      ${offCov.coverage_percentage}% of types hit super effectively
    </p>
    <div class="type-grid">${cells}</div>
    ${(offCov.uncovered_types || []).length > 0
      ? `<p style="font-size:11px;color:#ff7961;margin-top:10px">⚠ Can't hit SE: ${offCov.uncovered_types.join(', ')}</p>`
      : '<p style="font-size:11px;color:var(--green);margin-top:10px">✅ Full offensive coverage!</p>'
    }
  `);
  return el;
}

function exportReport() {
  if (!currentData) return;
  const { team, analysis, format } = currentData;

  let report = `# PokéBuilder Team Analysis\nFormat: ${format}\n\n`;
  report += `## Team\n${team.map(p => `- ${p.name} (${(p.types||[]).join('/')})`).join('\n')}\n\n`;

  const archetype = analysis.win_conditions?.team_archetype;
  if (archetype) report += `## Team Archetype\n${archetype}\n\n`;

  const missing = Object.entries(analysis.defensive_coverage || {})
    .filter(([t, d]) => !d.has_resist && !d.has_immunity)
    .map(([t]) => t);
  if (missing.length) report += `## Defensive Gaps\nNo resist to: ${missing.join(', ')}\n\n`;

  if (!analysis.hazard_removal?.has_removal) {
    report += `## ⚠ WARNING: No Hazard Removal\n\n`;
  }

  const threats = (analysis.threat_analysis?.threats || []).slice(0, 5);
  if (threats.length) {
    report += `## Shared Weaknesses\n`;
    threats.forEach(t => {
      report += `- ${t.threat}: threatens ${t.threatened_pokemon.map(p => p.name).join(', ')}\n`;
    });
    report += '\n';
  }

  const blob = new Blob([report], {type: 'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'team-analysis.md';
  a.click();
  URL.revokeObjectURL(url);
}

function openReport() {
  if (!currentData) return;
  sessionStorage.setItem('pokebuilder_report', JSON.stringify(currentData));
  window.open('/report', '_blank');
}

// Allow Ctrl+Enter to submit
document.getElementById('pokepaste').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') analyzeTeam();
});
</script>
